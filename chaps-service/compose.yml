services:
  db:
    image: postgres:18-alpine
    container_name: chaps_db
    environment:
      POSTGRES_USER: chaps_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: chaps_ledger
    ports:
      - "5432:5432"
    volumes:
      - ./internal/db:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chaps_admin -d chaps_ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: chaps_server
    platform: linux/amd64
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://chaps_admin:password123@db:5432/chaps_ledger"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
