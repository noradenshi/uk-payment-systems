services:
  db:
    image: postgres:18-alpine
    container_name: chaps_db
    environment:
      POSTGRES_USER: chaps_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: chaps_ledger
    command: >
      -c io_method=worker
      -c io_workers=4
      -c track_io_timing=on
    ports:
      - "5432:5432"
    volumes:
      - ./internal/db:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chaps_admin -d chaps_ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
