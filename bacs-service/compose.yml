services:
  db:
    image: postgres:18-alpine
    container_name: bacs_db
    environment:
      POSTGRES_USER: bacs_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: bacs_ledger
    ports:
      - "5434:5432"
    volumes:
      - ./internal/db:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bacs_admin -d bacs_ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: bacs_server
    platform: linux/amd64
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: "postgres://bacs_admin:password123@db:5432/bacs_ledger"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
