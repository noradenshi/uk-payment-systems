services:
  db:
    image: postgres:18-alpine
    container_name: bacs_db_dev
    environment:
      POSTGRES_USER: bacs_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: bacs_ledger
    ports:
      - "5434:5432"
    volumes:
      - ./internal/db:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
